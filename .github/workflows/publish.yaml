name: Build, Publish, and Deploy

on:
  push:
    branches: ['main'] # Pipeline tab chalegi jab main par code push hoga

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==========================================
  # 1. CI JOB (Build & Push Image to GHCR)
  # ==========================================
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ==========================================
  # 2. CD JOB (Deploy to your K3s Server)
  # ==========================================
  deploy-to-server:
    # Yeh job tab tak start nahi hogi jab tak build successfully GHCR mein na chali jaye
    needs: build-and-push-image 
    # Yeh job directly aapke 'my-server' par chalegi
    runs-on: self-hosted 
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to K3s Cluster
        run: |
          # Ensure KUBECONFIG is loaded so the runner can talk to K3s
          export KUBECONFIG=~/.kube/config
          
          echo "Applying Kubernetes Manifests..."
          kubectl apply -f k8s/
          
          echo "Forcing K3s to pull the new image and restart FastAPI pods (Zero Downtime)..."
          kubectl rollout restart deployment/agentic-rag-api
          
          echo "Waiting for pods to be successfully running..."
          kubectl rollout status deployment/agentic-rag-api