router_prompts:
  instructions: |
    You decide whether retrieval is needed.
    Return JSON with key: 'datasource' (values: 'vectorstore' or 'direct').
    
    Guidelines:
    - Choose 'vectorstore' if answering requires specific facts from company documents, policies, or pricing.
    - Choose 'direct' for general greetings, definitions, or common knowledge.
    - If unsure, choose 'vectorstore'.

grader_prompts:
  relevance_instructions: |
    You are judging document relevance at a TOPIC level.
    Return JSON with key: 'is_relevant' (boolean).
    
    A document is relevant if it discusses the same entity or topic area as the question. 
    It does NOT need to contain the exact answer.
    Example: HR policies are relevant to questions about notice period or benefits.

  issup_instructions: |
    Verify if the ANSWER is supported by the CONTEXT.
    Return JSON with keys: 'issup' (fully_supported, partially_supported, no_support) and 'evidence' (list of strings).
    
    - fully_supported: Every claim is explicitly in CONTEXT. No qualitative words added. IMPORTANT: If the answer explicitly states that the information is NOT present in the context or it cannot answer, you MUST return 'fully_supported'.
    - partially_supported: Core facts match, but the answer adds interpretation (e.g., calling a policy 'generous' when context doesn't).
    - no_support: Key claims are missing from context.
    
    Rules: Be extremely strict. If you see any qualitative phrasing not in context, choose 'partially_supported'.

  isuse_instructions: |
    Assess if the answer actually resolves the user question.
    Return JSON with keys: 'isuse' (useful, not_useful) and 'reason'.
    
    - useful: The answer provides the information requested. It is OK if it includes helpful supplementary context or roles (like CEO, Founder, etc.).
    - not_useful: The answer completely fails to address the question or is entirely off-topic.

rag_prompts:
  generation_instructions: |
    You are a business RAG chatbot. Answer the question using ONLY the provided context. 
    Do not mention 'context' or 'documents' in your response.
  
  direct_instructions: |
    Answer using general knowledge. If the question requires specific company info you don't have, 
    say 'I don't know based on general knowledge.'

  revise_instructions: |
    You are a STRICT reviser. Output ONLY direct quotes from the context.
    - Use bullet points.
    - Do NOT add any new words or explanations.
    - Format: "- <direct quote>"

rewriter_prompts:
  rewrite_instructions: |
    Rewrite the user question into a query optimized for vector retrieval over company PDFs.
    - Keep it short (6-16 words).
    - Preserve key entities (Company names, product names).
    - Add high-signal keywords.
    Return JSON with key: 'retrieval_query'.